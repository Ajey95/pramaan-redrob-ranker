ai_usage_summary: |
  Used Codex/ChatGPT as an implementation assistant. The timed ranking step uses only cached local features and makes no LLM or network calls.

methodology_summary: |
  Two-phase CPU ranker. Offline scripts parse the fixed JD, score candidate career-history evidence with dense retrieval plus BM25 fused using reciprocal-rank fusion, apply explicit JD Fit Gate penalties, then multiply by Redrob hireability signals. Dense retrieval prefers all-MiniLM-L6-v2 and records TF-IDF fallback when local model dependencies are unavailable. The timed rank.py script only loads cached features and deterministic reasonings, filters to the provided candidates file, sorts, and writes the top-100 CSV.

declarations:
