ai_usage_summary: |
  Used Codex/ChatGPT as an implementation assistant. The timed ranking step uses only cached local features and makes no LLM or network calls.

methodology_summary: |
  Two-phase CPU ranker. Offline scripts parse the fixed JD, score candidate career-history evidence with BM25 plus TF-IDF full-pool recall, run all-MiniLM-L6-v2 semantic scoring on the top-1000 shortlist, fuse rankings with reciprocal-rank fusion, apply explicit JD Fit Gate penalties, then multiply by Redrob hireability signals. The timed rank.py script scans candidate IDs, filters a pre-sorted runtime ranking cache, attaches deterministic cached reasonings, and writes the top-100 CSV without model inference, pandas, network, or LLM calls. Latest local full-100k timed run: 2.31 seconds, validator passing.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
